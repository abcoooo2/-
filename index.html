<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>老木空调维修宝 - 下载</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e14;
      --panel: #111820;
      --accent: #00d4ff;
      --accent2: #39ff14;
      --text: #e0e0e0;
      --text-dim: #8892a0;
      --border: #1e2a38;
    }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .container {
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-icon {
      font-size: 64px;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }
    .logo h1 span {
      color: var(--accent);
    }
    .logo p {
      color: var(--text-dim);
      font-size: 14px;
      margin-top: 4px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon {
      font-size: 20px;
    }

    /* APK Download */
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #0099cc);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
    }
    .download-btn:active {
      transform: translateY(0);
    }
    .download-btn .icon {
      font-size: 24px;
    }
    .download-info {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* QR Code */
    .qr-section {
      text-align: center;
    }
    .qr-box {
      display: inline-block;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .qr-box img, .qr-box canvas {
      display: block;
      width: 180px;
      height: 180px;
    }
    .qr-hint {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* Features */
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .feature-item {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .feature-item .icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    .feature-item .name {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* iOS PWA */
    .ios-section {
      background: rgba(57, 255, 20, 0.05);
      border-color: rgba(57, 255, 20, 0.2);
    }
    .ios-steps {
      font-size: 13px;
      line-height: 1.8;
    }
    .ios-steps li {
      margin-bottom: 8px;
      padding-left: 8px;
    }
    .ios-steps .highlight {
      color: var(--accent2);
      font-weight: 500;
    }

    /* Contact */
    .contact {
      text-align: center;
      padding: 16px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .contact a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: rgba(0, 212, 255, 0.15);
      color: var(--accent);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">❄️</div>
      <h1>老木<span>空调维修宝</span></h1>
      <p>专业空调维修计算工具</p>
    </div>

    <!-- Android APK Download -->
    <div class="card">
      <div class="card-title">
        <span class="icon">📱</span>
        Android 版下载
        <span class="badge">推荐</span>
      </div>
      
      <a href="老木空调维修宝.apk" class="download-btn" download>
        <span class="icon">⬇️</span>
        下载 APK 安装包
      </a>
      
      <div class="download-info">
        支持 Android 5.0 及以上 · 约 4.5 MB
      </div>
    </div>

    <!-- QR Code for Download -->
    <div class="card">
      <div class="card-title">
        <span class="icon">📷</span>
        扫码下载
      </div>
      <div class="qr-section">
        <div class="qr-box">
          <canvas id="qrCanvas"></canvas>
        </div>
        <div class="qr-hint">微信/浏览器扫码后点击下载</div>
      </div>
    </div>

    <!-- Features -->
    <div class="card">
      <div class="card-title">
        <span class="icon">✨</span>
        核心功能
      </div>
      <div class="features">
        <div class="feature-item">
          <div class="icon">🌡️</div>
          <div class="name">压力温度换算</div>
        </div>
        <div class="feature-item">
          <div class="icon">🔥</div>
          <div class="name">过热度过冷度</div>
        </div>
        <div class="feature-item">
          <div class="icon">⚠️</div>
          <div class="name">故障代码查询</div>
        </div>
        <div class="feature-item">
          <div class="icon">🧰</div>
          <div class="name">维修工具箱</div>
        </div>
      </div>
    </div>

    <!-- iOS PWA -->
    <div class="card ios-section">
      <div class="card-title">
        <span class="icon">🍎</span>
        iPhone 用户
      </div>
      <ol class="ios-steps">
        <li>用 <span class="highlight">Safari 浏览器</span> 打开本页面</li>
        <li>点击底部 <span class="highlight">分享按钮</span></li>
        <li>选择 <span class="highlight">"添加到主屏幕"</span></li>
        <li>像 APP 一样使用，支持离线</li>
      </ol>
    </div>

    <!-- Contact -->
    <div class="contact">
      联系邮箱：<a href="mailto:8497745@QQ.COM">8497745@QQ.COM</a>
      <br><br>
      © 2026 老木空调维修宝
    </div>
  </div>

  <!-- QR Code Generator -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // 生成当前页面URL的二维码
    var currentUrl = window.location.href;
    // 如果是文件协议，生成提示
    if (currentUrl.startsWith('file:')) {
      currentUrl = 'https://your-domain.com/download.html'; // 替换为实际域名
      document.querySelector('.qr-hint').textContent = '部署到服务器后显示二维码';
    }
    
    QRCode.toCanvas(document.getElementById('qrCanvas'), currentUrl, {
      width: 180,
      margin: 0,
      color: {
        dark: '#0a0e14',
        light: '#ffffff'
      }
    }, function(error) {
      if (error) {
        console.error(error);
        document.getElementById('qrCanvas').getContext('2d').fillStyle = '#f0f0f0';
        document.getElementById('qrCanvas').getContext('2d').fillRect(0, 0, 180, 180);
        document.getElementById('qrCanvas').getContext('2d').fillStyle = '#999';
        document.getElementById('qrCanvas').getContext('2d').font = '14px sans-serif';
        document.getElementById('qrCanvas').getContext('2d').textAlign = 'center';
        document.getElementById('qrCanvas').getContext('2d').fillText('二维码生成失败', 90, 90);
      }
    });
  </script>
</body>
</html>
